<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <style>
        body {
            background: #0b1a2e;
            background-image: radial-gradient(circle at 30% 40%, #1a3a4a 0%, transparent 30%),
                              radial-gradient(circle at 70% 60%, #2d1b3a 0%, transparent 40%);
            font-family: 'Yu Gothic', 'Segoe UI', 'Consolas', monospace;
            padding: 24px;
            margin: 0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }
        
        /* 月亮 */
        body::before {
            content: '';
            position: absolute;
            top: 30px;
            right: 50px;
            width: 80px;
            height: 80px;
            background: radial-gradient(circle at 30% 30%, #fff9e6, #d4c4a8);
            border-radius: 50%;
            box-shadow: 0 0 40px #fff9e6;
            opacity: 0.8;
        }
        
        .code-container {
            background: rgba(20, 20, 30, 0.85);
            backdrop-filter: blur(5px);
            border-radius: 24px;
            padding: 28px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.8), 0 0 0 1px rgba(255, 215, 0, 0.1);
            max-width: 900px;
            width: 100%;
            position: relative;
            border-left: 4px solid #ffb347;
        }
        
        /* 暖光台灯效果 */
        .code-container::after {
            content: '';
            position: absolute;
            top: -20px;
            left: 20px;
            width: 100px;
            height: 40px;
            background: radial-gradient(ellipse at 30% 50%, #ffb347 0%, transparent 70%);
            opacity: 0.3;
            filter: blur(10px);
        }
        
        .window-controls {
            display: flex;
            gap: 8px;
            margin-bottom: 20px;
        }
        
        .window-control {
            width: 12px;
            height: 12px;
            border-radius: 50%;
        }
        
        .close { background: #ff6b6b; }
        .minimize { background: #feca57; }
        .maximize { background: #48dbfb; }
        
        .filename {
            color: #ffb347;
            font-size: 15px;
            margin-bottom: 16px;
            padding: 8px 16px;
            background: rgba(255, 180, 70, 0.1);
            border-radius: 30px;
            display: inline-block;
            float: right;
            border: 1px solid rgba(255, 180, 70, 0.3);
            font-family: inherit;
            letter-spacing: 1px;
        }
        
        .filename::before {
            content: '☕';
            margin-right: 8px;
            font-size: 14px;
        }
        
        pre {
            margin: 0;
            padding: 24px;
            background: rgba(0, 0, 0, 0.4);
            border-radius: 16px;
            font-family: 'Consolas', 'Yu Gothic', monospace !important;
            font-size: 15px;
            line-height: 1.8;
            color: var(--text-color, #e6e0c0);
            white-space: pre-wrap;
            word-wrap: break-word;
            border: 1px solid rgba(255, 200, 100, 0.2);
            box-shadow: inset 0 0 30px rgba(0, 0, 0, 0.6);
        }
        
        /* 深夜代码配色 - 温暖护眼 */
        .highlight .c { color: #8b8b8b; font-style: italic; }
        .highlight .k { color: #ffb347; font-weight: bold; }
        .highlight .s { color: #add8e6; }
        .highlight .mi { color: #ffa07a; }
        .highlight .nf { color: #98fb98; }
        .highlight .nc { color: #ffdab9; }
        
        {{ style_defs | safe }}
    </style>
</head>
<body>
    <div class="code-container">
        <div class="window-controls">
            <div class="window-control close"></div>
            <div class="window-control minimize"></div>
            <div class="window-control maximize"></div>
        </div>
        <div class="filename">{{ filename }}</div>
        <pre>{{ highlighted_code | safe }}</pre>
    </div>
</body>
</html>
